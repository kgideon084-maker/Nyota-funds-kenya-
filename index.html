<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nyota Funds Kenya</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #FF6B00 0%, #FFA500 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 35px 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 420px;
    }
    .logo {
      text-align: center;
      margin-bottom: 25px;
    }
    .logo h1 {
      color: #FF6B00;
      font-size: 28px;
      margin-bottom: 5px;
    }
    .logo p {
      color: #666;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: border 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #FF6B00;
    }
    button {
      width: 100%;
      padding: 15px;
      background: #FF6B00;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 10px;
    }
    button:hover {
      background: #e55f00;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #message {
      text-align: center;
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      display: none;
    }
    .success {
      background: #d4edda;
      color: #155724;
      display: block;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }
    .info {
      background: #d1ecf1;
      color: #0c5460;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>Nyota Funds</h1>
      <p>Pay with M-Pesa STK Push</p>
    </div>
    
    <div class="form-group">
      <label>Phone Number</label>
      <input type="text" id="phone" placeholder="2547xxxxxxxx" required>
    </div>
    
    <div class="form-group">
      <label>Amount (KES)</label>
      <input type="number" id="amount" placeholder="Min 10 KES" min="10" required>
    </div>
    
    <button id="payBtn" onclick="payNow()">Pay Now</button>
    
    <div id="message"></div>
  </div>

  <script>
    function showMessage(text, type) {
      const msg = document.getElementById("message");
      msg.className = type;
      msg.innerText = text;
      msg.style.display = 'block';
    }

    async function payNow() {
      const phone = document.getElementById("phone").value.trim();
      const amount = document.getElementById("amount").value.trim();
      const btn = document.getElementById("payBtn");

      if(!phone || !amount) {
        showMessage("Please fill all fields", "error");
        return;
      }

      if(amount < 10) {
        showMessage("Minimum amount is 10 KES", "error");
        return;
      }

      btn.disabled = true;
      btn.innerText = "Sending STK...";
      showMessage("Check your phone for M-Pesa prompt", "info");

      try {
        // HII NDIO LINK YA BACKEND YA NYOTA
        const response = await fetch('https://nyota-funds-kenya-r7pj.onrender.com/pay', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ 
            phone: phone, 
            amount: amount 
          })
        });

        const data = await response.json();
        console.log("Payhero Response:", data);

        if(data.success === true || data.ResponseCode === "0" || data.status === "success") {
          showMessage("STK Sent! Enter your M-Pesa PIN", "success");
        } else {
          showMessage(data.message || data.error || "Failed: Jaribu tena", "error");
        }

      } catch (error) {
        console.log("Error:", error);
        showMessage("Network error. Please try again", "error");
      }

      btn.disabled = false;
      btn.innerText = "Pay Now";
    }
  </script>
</body>
</html>
